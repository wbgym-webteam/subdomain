<!--subdomain\src\app\templates\base.html-->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/favicon.svg') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <title>{% block title %}{% endblock %}</title>
  <style>

    @font-face {
      font-family: 'Futura-PT_ExtraBold';
      src: url('fonts/Futura-PT_ExtraBold.ttf') format('truetype');
    }

    html,
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
    }

    header {
      background: #560d4f;
      color: white;
      text-align: center;
      padding: 0.5%;
      margin-top: 1.5%;
      margin-left: 2.5%;
      margin-right: 2.5%;
    }

    h1 {
      font-family: 'Futura-PT_ExtraBold', sans-serif !important;
      font-weight: 900;
        margin: 0;
        padding: 1%;

    }

    h2 {
        font-family: sans-serif;
        margin: 0;
        padding: 1%;

    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    main {
      flex: 1 0 auto;
    }

    .student-footer {
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <main>
    {% block content %}{% endblock %}
  </main>
  <div class="student-footer">
      <p>Diese Website wurde komplett von Schülern der Webteam AG aufgebaut und wird durch Schüler der AG verwaltet.</p>
      <div class="info-container">
          <div class="info-icon">i</div>
          <div class="info-popover">
              <strong>Erstellt von:</strong>
              <ul style="text-align: left; margin-top: 5px; padding-left: 20px; margin-bottom: 0;">
                  <li>Michael Vorogushyn</li>
                  <li>Nicolas Evdokimov</li>
                  <li>Linus Busch</li>
                  <li>Philipp Kretschmer</li>
                  <li>Samuel Schlusche</li>
              </ul>
              <strong>Unterstützt von:</strong>
              <ul style="text-align: left; margin-top: 5px; padding-left: 20px; margin-bottom: 0;">
                  <li>Herrn Debray</li>
              </ul>
          </div>
      </div>
  </div>

</body>

</html>

{% extends 'base.html' %}

{% block title %}
PT - Admin Panel
{% endblock %}

{% block content %}

<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin/pt_panel.css') }}">
</head>

<header>
    <h1>PT - Control Panel</h1>
</header>

<div id="logout">
    <a href="../admin_logout">Logout</a>
</div>

<main>
    <!-- Upload Initial Data -->
    <form action="{{ url_for('pt_admin_views.pt_upload_file') }}" method="post" enctype="multipart/form-data">
        <label for="data_file">Upload Initial Data File (Classes, IDs, etc.):</label>
        <input type="file" name="file" id="data_file" accept=".xlsx, .xls" required>
        <input type="hidden" name="file_type" value="data">
        <button type="submit">Upload Initial Data</button>
    </form>
    <hr>

    <!-- Upload Names File -->
    <form action="{{ url_for('pt_admin_views.pt_upload_file') }}" method="post" enctype="multipart/form-data">
        <label for="names_file">Upload Names File (for Login Code Export):</label>
        <input type="file" name="file" id="names_file" accept=".xlsx, .xls" required>
        <input type="hidden" name="file_type" value="names">
        <button type="submit">Upload Names File</button>
    </form>
    <hr>

    <!-- Login Code Export -->
    <form action="{{ url_for('pt_admin_views.pt_export_logincodes_route') }}" method="post">
        <label for="export_login_codes">Export Login Codes:</label>
        <button type="submit">Export</button>
    </form>
    <a href="{{ url_for('pt_admin_views.pt_download_logincodes') }}" download>
        <button>Download Logincodes</button>
    </a>
    <hr>

    <!-- Wishes Export -->
    <form action="{{ url_for('pt_admin_views.pt_export_wishes') }}" method="post">
        <label for="export_login_codes">Export Wishes:</label>
        <button type="submit">Export</button>
    </form>
    <a href="{{ url_for('pt_admin_views.pt_download_wishes') }}" download>
        <button>Download Wishes</button>
    </a>
    <hr>

    <!-- Run Selection Engine -->
    <form action="{{ url_for('pt_admin_views.pt_run_selection') }}" method="post">
        <label for="run_selection">Run Course Assignment Algorithm:</label>
        <button type="submit" onclick="return confirm('This will assign students to courses based on their preferences. Continue?')">Run Selection Engine</button>
    </form>
    <a href="{{ url_for('pt_admin_views.pt_view_assignments') }}">
        <button>View Assignment Results</button>
    </a>
    <a href="{{ url_for('pt_admin_views.pt_export_assignments_pdf') }}">
        <button>Export Student Schedules (PDF)</button>
    </a>
    <a href="{{ url_for('pt_admin_views.pt_export_room_lists_pdf') }}">
        <button>Export Room Lists (PDF)</button>
    </a>
    <hr>

    <!-- Activate / Deactivate the module -->
    <form action="{{ url_for('pt_admin_views.pt_module_status') }}" method="post">
        <label for="module_status">Module Status:</label>
        <p class="status">{{ status }}</p>
        <input type="submit" value="Activate / Deactivate">
    </form>
</main>
{% endblock %}

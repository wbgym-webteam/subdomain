<!--subdomain\src\app\templates\login.html-->
{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<!-- Link placed directly in content block -->
<link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">

<!-- Admin panel inside Main, positioned absolutely by CSS -->
<div class="admin-panel">
    <a href="/admin_login">Admin</a>
</div>

<form method="post" class="login-container">
    <h1>Willkommen zurück!</h1>
    
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <p>Bitte geben Sie Ihren Login-Code ein, um fortzufahren.</p>
    
    <select name="event" id="event-selector">
        <option value="tdw" {% if status.get('TdW', 'inactive') == 'inactive' %}disabled{% endif %}>
            TdW
        </option>
        <option value="sms" {% if status.get('SmS', 'inactive') == 'inactive' %}disabled{% endif %}>
            SmS
        </option>
        <option value="pt" {% if status.get('PT', 'inactive') == 'inactive' %}disabled{% endif %}>
            PT
        </option>
    </select>
    
    <input type="password" name="logincode" id="logincode" placeholder="Login-Code" required>
    <input type="submit" value="Login" class="submit">
</form>

{% endblock %}
